<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sudoku">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#1a2218">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a2218;
    --surface: #1e2b1c;
    --cell-bg: #243322;
    --cell-hover: #2e4029;
    --cell-selected: #4a7c59;
    --cell-peer: #263524;
    --cell-same: #3d6b3a;
    --cell-given-bg: #1a2718;
    --text-given: #d4e8c2;
    --text-user: #a8d5a2;
    --text-error: #e07b6a;
    --text-notes: #7aab7a;
    --accent: #c8a96e;
    --accent2: #4a7c59;
    --border-thin: #2e4028;
    --border-thick: #5a7a50;
    --btn-bg: #1e2b1c;
    --btn-hover: #2a3d28;
    --btn-active: #4a7c59;
    --win-glow: #8fbe8a;
  }

  body {
    background: var(--bg);
    color: var(--text-given);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 8px;
    user-select: none;
  }

  header {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
  }

  select#difficulty {
    background: var(--btn-bg);
    color: var(--text-given);
    border: 1px solid var(--border-thin);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.9rem;
    cursor: pointer;
    outline: none;
  }
  select#difficulty:hover { border-color: var(--accent); }

  .controls {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .timer {
    font-size: 1.1rem;
    font-variant-numeric: tabular-nums;
    color: var(--text-given);
    min-width: 60px;
  }

  .spacer { flex: 1; }

  .ctrl-btn {
    background: var(--btn-bg);
    color: var(--text-given);
    border: 1px solid var(--border-thin);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .ctrl-btn:hover { background: var(--btn-hover); border-color: var(--accent2); }
  .ctrl-btn.active { background: var(--accent2); border-color: var(--accent2); }

  /* Grid */
  .grid-wrapper {
    width: 100%;
    max-width: 480px;
    aspect-ratio: 1;
    margin-bottom: 12px;
    position: relative;
  }

  .grid-wrapper.paused #grid {
    filter: blur(6px);
    pointer-events: none;
  }

  .grid-wrapper.paused::after {
    content: 'PAUSED';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: 8px;
    color: var(--text-given);
    opacity: 0.85;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    grid-template-rows: repeat(9, 1fr);
    width: 100%;
    height: 100%;
    background: var(--border-thick);
    border: 2px solid var(--border-thick);
    border-radius: 4px;
    gap: 1px;
  }

  .cell {
    background: var(--cell-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: background 0.1s;
    border-right: 1px solid var(--border-thin);
    border-bottom: 1px solid var(--border-thin);
  }
  .cell:hover { background: var(--cell-hover); }

  .cell.box-right  { border-right: 2px solid var(--border-thick); }
  .cell.box-bottom { border-bottom: 2px solid var(--border-thick); }

  .cell.given    { background: var(--cell-given-bg); }
  .cell.peer     { background: var(--cell-peer); }
  .cell.same-num { background: var(--cell-same); }
  .cell.selected { background: var(--cell-selected) !important; }

  .cell .value {
    font-size: clamp(14px, 4vmin, 26px);
    font-weight: 700;
    color: var(--text-given);
    line-height: 1;
    position: relative;
    z-index: 1;
  }
  .cell.user-entry .value { color: var(--text-user); }
  .cell.error .value      { color: var(--text-error); }

  .notes-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
    padding: 2px;
  }

  .notes-grid span {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(6px, 1.4vmin, 10px);
    color: var(--text-notes);
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.1s;
    line-height: 1;
  }
  .notes-grid span.visible { opacity: 1; }

  /* Number pad */
  .numpad {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 5px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 10px;
  }

  .num-btn {
    background: var(--btn-bg);
    color: var(--text-user);
    border: 1px solid var(--border-thin);
    border-radius: 6px;
    padding: 10px 4px;
    font-size: clamp(14px, 3.5vmin, 20px);
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .num-btn:hover  { background: var(--btn-hover); border-color: var(--text-user); }
  .num-btn:active { transform: scale(0.93); }
  .num-btn.complete { opacity: 0.25; filter: blur(1.5px); cursor: default; pointer-events: none; }

  /* Action buttons */
  .actions {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 480px;
    flex-wrap: wrap;
  }

  .action-btn {
    flex: 1;
    min-width: 100px;
    background: var(--btn-bg);
    color: var(--text-given);
    border: 1px solid var(--border-thin);
    border-radius: 8px;
    padding: 10px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .action-btn:hover { background: var(--btn-hover); border-color: var(--accent2); }
  .action-btn.primary {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #fff;
  }
  .action-btn.primary:hover { filter: brightness(1.2); }

  /* Win overlay */
  #win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #win-overlay.show { display: flex; }

  .win-box {
    background: var(--surface);
    border: 2px solid var(--win-glow);
    border-radius: 16px;
    padding: 36px 48px;
    text-align: center;
    box-shadow: 0 0 40px rgba(76,175,80,0.4);
  }
  .win-box h2 { font-size: 2rem; color: var(--win-glow); margin-bottom: 8px; }
  .win-box p  { color: #aaa; font-size: 1.1rem; margin-bottom: 20px; }
  .win-box button {
    background: var(--win-glow);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 700;
  }
  .win-box button:hover { filter: brightness(1.1); }

  @keyframes cell-pulse {
    0%   { background: var(--win-glow); }
    100% { background: var(--cell-bg); }
  }
  .cell.win-flash { animation: cell-pulse 0.6s ease-out forwards; }
</style>
</head>
<body>

<header>
  <h1>Sudoku</h1>
  <select id="difficulty">
    <option value="easy">Easy</option>
    <option value="medium" selected>Medium</option>
    <option value="hard">Hard</option>
    <option value="expert">Expert</option>
    <option value="diabolical">Diabolical</option>
    <option value="extraspicy">🌶 Extra Spicy</option>
  </select>
</header>

<div class="controls">
  <span class="timer" id="timer">⏱ 00:00</span>
  <div class="spacer"></div>
  <button class="ctrl-btn" id="pause-btn" title="Pause (P)">⏸ Pause</button>
  <button class="ctrl-btn" id="notes-btn" title="Toggle notes mode (N)">✏ Notes</button>
  <button class="ctrl-btn" id="hide-notes-btn" title="Hide/show pencil marks">👁 Notes</button>
  <button class="ctrl-btn" id="undo-btn" title="Undo (Ctrl+Z)">↩ Undo</button>
</div>

<div class="grid-wrapper">
  <div id="grid"></div>
</div>

<div class="numpad" id="numpad"></div>

<div class="actions">
  <button class="action-btn" id="check-btn">Check</button>
  <button class="action-btn" id="solve-btn">Solve</button>
  <button class="action-btn primary" id="new-btn">New Game</button>
</div>

<div id="win-overlay">
  <div class="win-box">
    <h2>Solved!</h2>
    <p id="win-time"></p>
    <button id="win-new-btn">New Game</button>
  </div>
</div>

<script>
// ─── Data ───────────────────────────────────────────────────────────────────
let puzzle   = new Int8Array(81);
let solution = new Int8Array(81);
let board    = new Int8Array(81);
let notes    = Array.from({length: 81}, () => new Set());
let givens   = new Uint8Array(81);

const state = {
  selected: -1,
  notesMode: false,
  hideNotes: false,
  paused: false,
  difficulty: 'medium',
  timerSeconds: 0,
  timerInterval: null,
  solved: false,
};

const history = [];
const cellElements = [];

// Precompute peer indices for all 81 cells
const PEERS = (() => {
  const p = [];
  for (let i = 0; i < 81; i++) {
    const row = Math.floor(i / 9), col = i % 9;
    const br = Math.floor(row / 3) * 3, bc = Math.floor(col / 3) * 3;
    const s = new Set();
    for (let k = 0; k < 9; k++) {
      s.add(row * 9 + k);
      s.add(k * 9 + col);
      s.add((br + Math.floor(k / 3)) * 9 + (bc + k % 3));
    }
    s.delete(i);
    p.push([...s]);
  }
  return p;
})();

// ─── Generation ─────────────────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function isValid(b, idx, digit) {
  for (const p of PEERS[idx]) if (b[p] === digit) return false;
  return true;
}

function generateSolution(b) {
  const empty = b.indexOf(0);
  if (empty === -1) return true;
  for (const d of shuffle([1,2,3,4,5,6,7,8,9])) {
    if (isValid(b, empty, d)) {
      b[empty] = d;
      if (generateSolution(b)) return true;
      b[empty] = 0;
    }
  }
  return false;
}

function countSolutions(b, limit = 2) {
  let count = 0;
  function solve(b) {
    if (count >= limit) return;
    const empty = b.indexOf(0);
    if (empty === -1) { count++; return; }
    for (let d = 1; d <= 9; d++) {
      if (isValid(b, empty, d)) {
        b[empty] = d;
        solve(b);
        b[empty] = 0;
        if (count >= limit) return;
      }
    }
  }
  solve(b);
  return count;
}

const TARGET_GIVENS = { easy: 46, medium: 36, hard: 28, expert: 23, diabolical: 19, extraspicy: 17 };

function removeClues(sol, target) {
  const b = sol.slice();
  const indices = shuffle([...Array(81).keys()]);
  let remaining = 81;
  for (const idx of indices) {
    if (remaining <= target) break;
    const saved = b[idx];
    b[idx] = 0;
    if (countSolutions(b.slice()) !== 1) b[idx] = saved;
    else remaining--;
  }
  return b;
}

// ─── Smart Notes ─────────────────────────────────────────────────────────────
function initNotes() {
  for (let i = 0; i < 81; i++) {
    notes[i] = new Set();
    if (board[i] === 0) {
      const used = new Set(PEERS[i].map(p => board[p]).filter(v => v > 0));
      for (let d = 1; d <= 9; d++) if (!used.has(d)) notes[i].add(d);
    }
  }
}

function shrinkNotesForPlacement(idx, digit) {
  for (const peer of PEERS[idx]) notes[peer].delete(digit);
  notes[idx] = new Set();
}

// ─── Game actions ────────────────────────────────────────────────────────────
function placeDigit(idx, digit) {
  if (givens[idx]) return;
  if (state.solved) return;
  if (state.paused) return;

  // snapshot for undo
  const prevNotesCopy = notes.map(s => new Set(s));
  const prevValue = board[idx];
  history.push({ idx, prevValue, prevNotesCopy });

  if (digit === 0) {
    board[idx] = 0;
    // Restore notes based on current board peers
    const used = new Set(PEERS[idx].map(p => board[p]).filter(v => v > 0));
    notes[idx] = new Set();
    for (let d = 1; d <= 9; d++) if (!used.has(d)) notes[idx].add(d);
  } else {
    board[idx] = digit;
    shrinkNotesForPlacement(idx, digit);
  }

  checkWin();
  render();
}

function toggleNote(idx, digit) {
  if (givens[idx]) return;
  if (board[idx] !== 0) return;
  if (state.solved) return;
  if (state.paused) return;

  const prevNotesCopy = notes.map(s => new Set(s));
  history.push({ idx, prevValue: 0, prevNotesCopy });

  if (notes[idx].has(digit)) notes[idx].delete(digit);
  else notes[idx].add(digit);

  render();
}

function undoMove() {
  if (!history.length) return;
  const { idx, prevValue, prevNotesCopy } = history.pop();
  board[idx] = prevValue;
  notes.forEach((_, i) => { notes[i] = prevNotesCopy[i]; });
  render();
}

function checkBoard() {
  let anyWrong = false;
  for (let i = 0; i < 81; i++) {
    if (board[i] !== 0 && !givens[i] && board[i] !== solution[i]) {
      cellElements[i].classList.add('error');
      anyWrong = true;
    } else {
      cellElements[i].classList.remove('error');
    }
  }
  if (!anyWrong && board.every(v => v !== 0)) checkWin();
}

function solveBoard() {
  board.set(solution);
  notes.forEach(s => s.clear());
  stopTimer();
  state.solved = true;
  render();
}

function checkWin() {
  if (state.solved) return;
  if (board.every((v, i) => v === solution[i])) {
    stopTimer();
    state.solved = true;
    animateWin();
  }
}

function animateWin() {
  // flash cells in sequence
  const order = [...Array(81).keys()];
  order.forEach((i, seq) => {
    setTimeout(() => {
      cellElements[i].classList.add('win-flash');
    }, seq * 8);
  });
  setTimeout(() => {
    document.getElementById('win-time').textContent =
      `Time: ${formatTime(state.timerSeconds)}`;
    document.getElementById('win-overlay').classList.add('show');
  }, 81 * 8 + 200);
}

// ─── New game ────────────────────────────────────────────────────────────────
function newGame(diff) {
  diff = diff || state.difficulty;
  state.difficulty = diff;
  state.selected = -1;
  state.notesMode = false;
  state.solved = false;
  history.length = 0;

  stopTimer();
  state.timerSeconds = 0;
  state.paused = false;
  state.hideNotes = false;
  document.getElementById('pause-btn').textContent = '⏸ Pause';
  document.getElementById('pause-btn').classList.remove('active');
  document.getElementById('hide-notes-btn').classList.remove('active');
  document.querySelector('.grid-wrapper').classList.remove('paused');
  document.getElementById('win-overlay').classList.remove('show');

  // Remove any lingering animations
  cellElements.forEach(c => c.classList.remove('win-flash', 'error'));

  solution.fill(0);
  generateSolution(solution);

  const puzzleArr = removeClues(solution, TARGET_GIVENS[diff]);
  puzzle.set(puzzleArr);
  board.set(puzzle);
  givens.fill(0);
  for (let i = 0; i < 81; i++) if (puzzle[i] !== 0) givens[i] = 1;

  initNotes();
  document.getElementById('notes-btn').classList.remove('active');
  render();
  startTimer();
}

// ─── Pause ───────────────────────────────────────────────────────────────────
function togglePause() {
  if (state.solved) return;
  state.paused = !state.paused;
  const btn = document.getElementById('pause-btn');
  const wrapper = document.querySelector('.grid-wrapper');
  if (state.paused) {
    stopTimer();
    btn.textContent = '▶ Resume';
    btn.classList.add('active');
    wrapper.classList.add('paused');
  } else {
    startTimer();
    btn.textContent = '⏸ Pause';
    btn.classList.remove('active');
    wrapper.classList.remove('paused');
  }
}

// ─── Timer ───────────────────────────────────────────────────────────────────
function startTimer() {
  stopTimer();
  state.timerInterval = setInterval(() => {
    if (!state.solved) {
      state.timerSeconds++;
      document.getElementById('timer').textContent = '⏱ ' + formatTime(state.timerSeconds);
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(state.timerInterval);
  state.timerInterval = null;
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

// ─── Rendering ───────────────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 0; i < 81; i++) {
    const row = Math.floor(i / 9), col = i % 9;
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.index = i;
    if (col === 2 || col === 5) cell.classList.add('box-right');
    if (row === 2 || row === 5) cell.classList.add('box-bottom');

    const val = document.createElement('span');
    val.className = 'value';
    cell.appendChild(val);

    const ng = document.createElement('div');
    ng.className = 'notes-grid';
    for (let n = 1; n <= 9; n++) {
      const s = document.createElement('span');
      s.dataset.n = n;
      s.textContent = n;
      ng.appendChild(s);
    }
    cell.appendChild(ng);

    cell.addEventListener('click', () => onCellClick(i));
    cellElements.push(cell);
    grid.appendChild(cell);
  }
}

function render() {
  const sel = state.selected;
  const selVal = sel !== -1 ? board[sel] : 0;

  for (let i = 0; i < 81; i++) {
    const cell = cellElements[i];
    const val = board[i];

    // base classes (preserve box-right / box-bottom)
    cell.classList.remove('given', 'user-entry', 'peer', 'same-num', 'selected', 'error');

    if (givens[i]) cell.classList.add('given');
    else if (val !== 0) cell.classList.add('user-entry');

    if (sel !== -1) {
      if (i === sel) {
        cell.classList.add('selected');
      } else if (PEERS[sel].includes(i)) {
        cell.classList.add('peer');
      } else if (selVal !== 0 && val === selVal) {
        cell.classList.add('same-num');
      }
    }

    // Value / notes
    const valSpan = cell.querySelector('.value');
    const ng = cell.querySelector('.notes-grid');

    if (val !== 0) {
      valSpan.textContent = val;
      ng.style.display = 'none';
    } else {
      valSpan.textContent = '';
      ng.style.display = state.hideNotes ? 'none' : 'grid';
      if (!state.hideNotes) {
        for (const s of ng.querySelectorAll('span')) {
          s.classList.toggle('visible', notes[i].has(+s.dataset.n));
        }
      }
    }
  }

  // notes-btn state
  document.getElementById('notes-btn').classList.toggle('active', state.notesMode);

  // Blur numpad buttons for fully-placed digits
  const counts = new Array(10).fill(0);
  for (let i = 0; i < 81; i++) if (board[i] > 0) counts[board[i]]++;
  document.querySelectorAll('.num-btn').forEach(btn => {
    btn.classList.toggle('complete', counts[+btn.textContent] === 9);
  });
}

// ─── Events ──────────────────────────────────────────────────────────────────
function onCellClick(idx) {
  if (state.paused) return;
  state.selected = idx;
  render();
}

document.addEventListener('keydown', e => {
  if (e.key === 'p' || e.key === 'P') { togglePause(); return; }

  if (state.paused) return;

  if (e.key === 'n' || e.key === 'N') {
    state.notesMode = !state.notesMode;
    document.getElementById('notes-btn').classList.toggle('active', state.notesMode);
    return;
  }

  if ((e.key === 'z' && (e.ctrlKey || e.metaKey)) || e.key === 'z') {
    undoMove(); return;
  }

  const idx = state.selected;

  if (e.key.startsWith('Arrow')) {
    e.preventDefault();
    const cur = idx === -1 ? 0 : idx;
    const row = Math.floor(cur / 9), col = cur % 9;
    let nr = row, nc = col;
    if (e.key === 'ArrowUp')    nr = Math.max(0, row - 1);
    if (e.key === 'ArrowDown')  nr = Math.min(8, row + 1);
    if (e.key === 'ArrowLeft')  nc = Math.max(0, col - 1);
    if (e.key === 'ArrowRight') nc = Math.min(8, col + 1);
    state.selected = nr * 9 + nc;
    render();
    return;
  }

  if (idx === -1) return;

  if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') {
    placeDigit(idx, 0); return;
  }

  const d = parseInt(e.key);
  if (d >= 1 && d <= 9) {
    if (state.notesMode) toggleNote(idx, d);
    else placeDigit(idx, d);
  }
});

// Number pad
const numpad = document.getElementById('numpad');
for (let d = 1; d <= 9; d++) {
  const btn = document.createElement('button');
  btn.className = 'num-btn';
  btn.textContent = d;
  btn.addEventListener('click', () => {
    if (state.selected === -1) return;
    if (state.notesMode) toggleNote(state.selected, d);
    else placeDigit(state.selected, d);
  });
  numpad.appendChild(btn);
}

document.getElementById('pause-btn').addEventListener('click', togglePause);

document.getElementById('notes-btn').addEventListener('click', () => {
  state.notesMode = !state.notesMode;
  document.getElementById('notes-btn').classList.toggle('active', state.notesMode);
});

document.getElementById('hide-notes-btn').addEventListener('click', () => {
  state.hideNotes = !state.hideNotes;
  document.getElementById('hide-notes-btn').classList.toggle('active', state.hideNotes);
  render();
});

document.getElementById('undo-btn').addEventListener('click', undoMove);
document.getElementById('check-btn').addEventListener('click', checkBoard);
document.getElementById('solve-btn').addEventListener('click', solveBoard);
document.getElementById('new-btn').addEventListener('click', () => newGame());
document.getElementById('win-new-btn').addEventListener('click', () => newGame());

document.getElementById('difficulty').addEventListener('change', e => {
  state.difficulty = e.target.value;
  newGame(e.target.value);
});

// ─── Init ────────────────────────────────────────────────────────────────────
buildGrid();
newGame('medium');
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
